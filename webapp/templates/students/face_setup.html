<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Face Setup</title>

  {% load static %}

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; background: #f0f2f5; }
    .card { border-radius: 16px; }
    video { width: 100%; border-radius: 12px; background: #000; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h3 class="fw-bold mb-2">One-time Face Setup</h3>
            <p class="text-muted mb-4">
              Before you can use the dashboard, please enroll your face. This creates a secure face signature (encoding)
              that will be used to verify you when marking attendance.
            </p>

            <div class="mb-3">
              <video id="cameraFeed" autoplay playsinline></video>
              <canvas id="cameraCanvas" style="display:none;"></canvas>
            </div>

            <div class="d-flex gap-2">
              <button id="enrollBtn" class="btn btn-primary fw-semibold">Enroll Face (AI)</button>
              <button id="retryBtn" class="btn btn-outline-secondary fw-semibold" type="button">Restart Camera</button>
            </div>

            <div class="mt-3" id="statusBox"></div>

            <hr class="my-4" />

            <p class="small text-muted mb-0">
              Tips: Use good lighting, look straight at the camera, and ensure only your face is visible.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const cameraFeed = document.getElementById('cameraFeed');
    const cameraCanvas = document.getElementById('cameraCanvas');
    const enrollBtn = document.getElementById('enrollBtn');
    const retryBtn = document.getElementById('retryBtn');
    const statusBox = document.getElementById('statusBox');

    let stream = null;

    function setStatus(html, type='info') {
      const cls = type === 'success' ? 'alert-success' : type === 'danger' ? 'alert-danger' : 'alert-info';
      statusBox.innerHTML = `<div class="alert ${cls} mb-0">${html}</div>`;
    }

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    async function startCamera() {
      try {
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
          stream = null;
        }
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        cameraFeed.srcObject = stream;
        await cameraFeed.play();
        setStatus('Camera ready. Click <b>Enroll Face (AI)</b> when you are ready.');
      } catch (err) {
        console.error(err);
        setStatus('Could not access the camera. Please allow camera permission and refresh the page.', 'danger');
      }
    }

    function captureFrame() {
      if (!cameraFeed.srcObject || !cameraFeed.videoWidth || !cameraFeed.videoHeight) {
        throw new Error('Camera not ready yet.');
      }
      const ctx = cameraCanvas.getContext('2d');
      cameraCanvas.width = cameraFeed.videoWidth;
      cameraCanvas.height = cameraFeed.videoHeight;
      ctx.drawImage(cameraFeed, 0, 0, cameraCanvas.width, cameraCanvas.height);
      return cameraCanvas.toDataURL('image/jpeg', 0.85);
    }

    async function enrollFace() {
      enrollBtn.disabled = true;
      try {
        setStatus('Enrolling face… please hold still.');
        const imageDataUrl = captureFrame();

        const res = await fetch('/api/enroll-face/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
          },
          body: JSON.stringify({ image_data: imageDataUrl })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.error || 'Face enrollment failed.');
        }

        setStatus('Face enrolled successfully ✅ Redirecting to your dashboard…', 'success');

        // Stop camera for privacy
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
          stream = null;
        }

        setTimeout(() => {
          window.location.href = "{% url 'student_dashboard' %}";
        }, 900);

      } catch (err) {
        console.error(err);
        setStatus(err.message, 'danger');
      } finally {
        enrollBtn.disabled = false;
      }
    }

    enrollBtn.addEventListener('click', enrollFace);
    retryBtn.addEventListener('click', startCamera);

    document.addEventListener('DOMContentLoaded', startCamera);
  </script>
</body>
</html>
